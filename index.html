<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Site</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="cursor"></div>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-content">

      <!-- SOCIAL BUTTONS -->
      <div class="social-rectangles">

        <!-- STRAVA (TOP CENTER BIG) -->
        <a href="https://strava.app.link/CXlRKkZn42b" target="_blank" class="social-btn strava">
          <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/strava.svg">
          <span>Strava</span>
        </a>

        <!-- IG + FB ROW -->
        <div class="social-row">

          <a href="https://www.instagram.com/sndrixz__?igsh=MWJhMHl1bW1xYW90eQ==" target="_blank" class="social-btn">
            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg">
            <span>Instagram</span>
          </a>

          <a href="https://www.facebook.com/share/1AyBRbye5k/" target="_blank" class="social-btn">
            <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg">
            <span>Facebook</span>
          </a>

        </div>

      </div>

      <!-- TEXT -->
      <div class="text">
        <h1 class="glow">Hello</h1>
        <p class="fade-in"></p>
        <button class="btn">ENTER</button>
      </div>

    </div>
  </header>

  <!-- APP STRIP -->
  <div class="app-strip">
    <div class="app-track">

      <div class="set">
        <a href="https://github.com" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg"></a>
        <a href="https://gitlab.com" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gitlab.svg"></a>
        <a href="https://codepen.io" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/codepen.svg"></a>
        <a href="https://react.dev" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/react.svg"></a>
        <a href="https://nodejs.org" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/nodedotjs.svg"></a>
        <a href="https://www.python.org" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/python.svg"></a>
        <a href="https://docker.com" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/docker.svg"></a>
      </div>

      <div class="set">
        <a href="https://github.com" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg"></a>
        <a href="https://gitlab.com" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gitlab.svg"></a>
        <a href="https://codepen.io" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/codepen.svg"></a>
        <a href="https://react.dev" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/react.svg"></a>
        <a href="https://nodejs.org" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/nodedotjs.svg"></a>
        <a href="https://www.python.org" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/python.svg"></a>
        <a href="https://docker.com" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/docker.svg"></a>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
